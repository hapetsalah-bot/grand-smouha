<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve | Grand Smouha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-wrapper">
        
        <header class="glass-header">
            <div class="logo">
                <span class="sparkle">✧</span> Grand Smouha
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Expertise</a></li>
                    <li><a href="booking.html" class="active">Reserve</a></li>
                    <li><a href="contact.html">Visit Us</a></li>
                </ul>
            </nav>
        </header>

        <main class="page-content">
            <div class="glass-card">
                <h2>Reserve Your Visit</h2>
                <p>Experience the highest standard of dental care.</p>
                
                <form action="mailto:yourclinic@email.com" method="post" enctype="text/plain">
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="premium-input" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" class="premium-input" placeholder="e.g. 0123456789" required>
                    </div>

                    <div class="form-group">
                        <label>Service Needed</label>
                        <select class="premium-input" required>
                            <option value="">Select a treatment...</option>
                            <option value="cleaning">Aesthetic Cleaning</option>
                            <option value="whitening">Laser Whitening</option>
                            <option value="implants">Dental Implants</option>
                            <option value="consultation">General Consultation</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Preferred Date & Time</label>
                        <input type="datetime-local" class="premium-input" required>
                    </div>

                    <div class="form-group">
                        <label>Any specific requests?</label>
                        <textarea class="premium-input" placeholder="Let us know how we can make your visit perfect..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Request Appointment</button>

                </form>
            </div>
        </main>
        
    </div>

    <a href="https://wa.me/201111440043" target="_blank" class="whatsapp-float">
        <span class="wa-icon">💬</span> Let's Chat
    </a>
</body>
</html>
